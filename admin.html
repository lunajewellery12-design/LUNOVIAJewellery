<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة إدارة Luna Jewellery</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-container { max-width: 1100px; margin: 40px auto; padding: 20px; background:#fff; border-radius:12px; box-shadow:var(--shadow); }
        .tab-btn { padding:10px 20px; margin-left:10px; cursor:pointer; background:#fff; border:1px solid var(--logo-gold); border-radius:5px; }
        .tab-btn.active { background:var(--logo-gold); color:#fff; }
        .table { width:100%; border-collapse:collapse; margin-top:20px; }
        .table th, .table td { padding:12px; border:1px solid #ddd; text-align:center; }
    </style>
</head>
<body>
    <header>
        <div class="logo-area">
            <img class="logo-img" src="logo.png" alt="Luna Logo">
            <h1 class="brand-name">لوحة تحكم الإدارة</h1>
        </div>
        <a href="index.html" class="btn">العودة للمتجر</a>
    </header>

    <div class="admin-container">
        <div>
            <button class="tab-btn active" onclick="switchTab('analytics')">سجل نشاط العملاء 📊</button>
            <button class="tab-btn" onclick="switchTab('inventory')">إدارة العروض والأسعار 🏷️</button>
        </div>

        <!-- تبويب مراقبة العملاء -->
        <div id="analytics-tab" class="tab-content" style="display:block;">
            <h3 style="margin-top:20px;">سجل التصفح السحابي التجريبي</h3>
            <table class="table">
                <thead>
                    <tr>
                        <th>اسم العميل</th>
                        <th>طريقة الدخول</th>
                        <th>المنتج الذي نال الاهتمام</th>
                        <th>وقت الزيارة</th>
                    </tr>
                </thead>
                <tbody id="logs-tbody">
                    <!-- تعبأ ديناميكياً -->
                </tbody>
            </table>
        </div>

        <!-- تبويب إدارة المخزون والعروض -->
        <div id="inventory-tab" class="tab-content" style="display:none;">
            <h3 style="margin-top:20px;">إضافة عرض جديد</h3>
            <form id="add-product-form" style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-top:15px;">
                <input type="text" id="new-title" placeholder="اسم المنتج" required style="padding:10px;">
                <input type="number" id="new-price" placeholder="السعر (ج.م)" required style="padding:10px;">
                <input type="text" id="new-slogan" placeholder="الجملة الرنانة" required style="padding:10px;">
                <button type="submit" class="btn">إضافة العرض للمتجر</button>
            </form>

            <h3 style="margin-top:40px;">العروض الحالية</h3>
            <table class="table">
                <thead>
                    <tr>
                        <th>صورة المنتج</th>
                        <th>الاسم</th>
                        <th>الجملة الرنانة</th>
                        <th>السعر (ج.م)</th>
                        <th>إجراءات</th>
                    </tr>
                </thead>
                <tbody id="products-tbody">
                    <!-- تعبأ ديناميكياً وتسمح بتعديل السعر المباشر -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
