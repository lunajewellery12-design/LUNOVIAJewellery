<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUNOVIA | لوحة التحكم الإدارية الفخمة</title>
    
<!-- في ملف index.html و admin.html -->
<link rel="stylesheet" href="style.css?v=1.1">

    <style>
        /* تنسيقات مخصصة للوحة الإدارة تتماشى مع الفخامة السوداء والذهبية */
        .admin-container { 
            max-width: 1100px; 
            margin: 40px auto; 
            padding: 30px; 
            background: var(--card-bg); 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); 
            border: 1px solid var(--border-gold); 
        }
        
        .tab-btn { 
            padding: 12px 24px; 
            margin-left: 10px; 
            cursor: pointer; 
            background: #222; 
            color: var(--text-white);
            border: 1px solid var(--border-gold); 
            border-radius: 50px; 
            font-weight: 600; 
            transition: 0.3s; 
        }
        
        .tab-btn.active { 
            background: linear-gradient(135deg, #d4af37, #aa7c11); 
            color: #000 !important; 
            border-color: var(--gold-primary); 
        }

        .table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 25px; 
            background-color: #111;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .table th, .table td { 
            padding: 16px; 
            border-bottom: 1px solid var(--border-gold); 
            text-align: center; 
            color: var(--text-white);
        }
        
        .table th { 
            background-color: #1a1a1a; 
            color: var(--gold-primary); 
            font-weight: 700;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            background-color: #222;
            border: 1px solid var(--border-gold);
            border-radius: 6px;
            color: white;
            font-family: 'Cairo', sans-serif;
        }

        .form-input:focus {
            outline: 2px solid var(--gold-primary);
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            border-bottom: 1px solid var(--border-gold);
            background-color: var(--dark-bg);
        }

        .btn-secondary {
            background: #222 !important;
            color: var(--text-white) !important;
            border: 1px solid var(--border-gold) !important;
        }

        .btn-secondary:hover {
            background: #e74c3c !important;
            border-color: #e74c3c !important;
        }
    </style>
    
    <script>
        // كود حماية حارس الصفحة المطور: التحقق من المفتاح الموحد الجديد لمنع أي دخول غير مصرح به
        if (localStorage.getItem('lunovia_admin_auth') !== 'authenticated') {
            alert('عذراً، هذه المنطقة محظورة ومخصصة لإدارة LUNOVIA فقط! يرجى تسجيل الدخول أولاً.');
            window.location.href = 'index.html';
        }
    </script>
</head>
<body>

    <!-- الترويسة الفاخرة للوحة التحكم -->
    <header class="admin-header">
        <div class="logo">
            <h1 class="logo-text">LUNOVIA</h1>
            <p class="logo-sub">CONTROL PANEL</p>
        </div>
        <div style="display: flex; gap: 10px; align-items: center;">
            <button onclick="logoutAdmin()" class="btn btn-secondary" style="width: auto; padding: 10px 20px;">تسجيل الخروج</button>
            <a href="index.html" class="btn" style="width: auto; padding: 10px 20px;">عرض المتجر الرسمي</a>
        </div>
    </header>

    <div class="admin-container">
        <!-- أزرار التبويبات الفخمة مع تمرير الـ event بشكل صحيح تماماً لمنع توقف الكود -->
        <div style="display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;">
            <button class="tab-btn active" onclick="switchTab('analytics', event)">سجل نشاط العملاء وعروضهم المفضلة 📊</button>
            <button class="tab-btn" onclick="switchTab('inventory', event)">إدارة المخزون وإضافة قطع جديدة 🏷️</button>
        </div>

        <!-- 1. سجل تصفح واهتمامات العملاء -->
        <div id="analytics-tab" class="tab-content" style="display: block;">
            <h3 style="margin-top: 30px; font-size: 18px; color: var(--gold-primary); text-align: center;">سجل اهتمامات وتفاعل عملاء LUNOVIA</h3>
            <div style="overflow-x: auto;">
                <table class="table">
                    <thead>
                        <tr>
                            <th>العميل</th>
                            <th>وسيلة الدخول</th>
                            <th>العرض المفضل (الذي نقر عليه)</th>
                            <th>توقيت التفاعل</th>
                        </tr>
                    </thead>
                    <tbody id="logs-tbody">
                        <!-- يتم إنشاؤه ديناميكياً بواسطة جافا سكريبت -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 2. إدارة المنتجات ورفع الصور الفورية -->
        <div id="inventory-tab" class="tab-content" style="display: none;">
            <h3 style="margin-top: 30px; font-size: 18px; color: var(--gold-primary); text-align: center;">إضافة قطعة مجوهرات جديدة للمتجر</h3>
            
            <form id="add-product-form" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; margin-top: 20px;">
                <input type="text" id="new-title" placeholder="اسم القطعة (مثال: خاتم هلال القمر)" class="form-input" required>
                <input type="number" id="new-price" placeholder="السعر بالدولار ($)" class="form-input" required>
                <input type="text" id="new-slogan" placeholder="عبارة تسويقية رنانة (مثال: بريق مستوحى من القمر)" class="form-input" required>
                
                <div style="display: flex; flex-direction: column; gap: 5px;">
                    <label style="font-size: 13px; color: var(--text-muted); font-weight: 600;">اختر صورة العرض الفاخرة من جهازك 📷:</label>
                    <input type="file" id="new-img-file" accept="image/*" class="form-input" style="padding: 8px;" required>
                </div>

                <div style="grid-column: 1 / -1; text-align: center; margin-top: 15px;">
                    <button type="submit" class="btn" style="max-width: 300px; margin: 0 auto;">حفظ وإضافة العرض للمتجر ✨</button>
                </div>
            </form>

            <h3 style="margin-top: 40px; font-size: 18px; color: var(--gold-primary); text-align: center;">القطع الحالية المعروضة في LUNOVIA</h3>
            <div style="overflow-x: auto;">
                <table class="table">
                    <thead>
                        <tr>
                            <th>صورة القطعة</th>
                            <th>الاسم</th>
                            <th>العبارة التسويقية</th>
                            <th>السعر ($)</th>
                            <th>تعديل/حذف</th>
                        </tr>
                    </thead>
                    <tbody id="products-tbody">
                        <!-- يتم إنشاؤه ديناميكياً بواسطة جافا سكريبت -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- استدعاء ملفات التحكم البرمجي بشكل مباشر لضمان التكامل التام -->
    <script src="auth.js"></script>
    <script src="admin.js"></script>
</body>
</html>
