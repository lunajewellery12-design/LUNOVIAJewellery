<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<meta
name="description"
content="LUNOVIA - Elegant Jewelry Store">

<meta
name="keywords"
content="Jewelry,Rings,Necklaces,Earrings,Luxury">

<meta
name="author"
content="LUNOVIA">

<meta
name="theme-color"
content="#ffffff">

<title data-title="home.title">
LUNOVIA
</title>

<link
rel="icon"
href="assets/images/favicon.ico">

<link
rel="preconnect"
href="https://fonts.googleapis.com">

<link
rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<link
rel="stylesheet"
href="assets/css/style.css">

</head>

<body>

<div id="app">
  <!--=========================================
HEADER
==========================================-->

<header class="header">

<div class="container">

<a
href="index.html"
class="logo">

LUNOVIA

</a>

<nav class="navbar">

<ul class="nav-list">

<li>

<a
href="index.html"
class="active"
data-i18n="nav.home">

Home

</a>

</li>

<li>

<a
href="shop.html"
data-i18n="nav.shop">

Shop

</a>

</li>

<li>

<a
href="about.html"
data-i18n="nav.about">

About

</a>

</li>

<li>

<a
href="contact.html"
data-i18n="nav.contact">

Contact

</a>

</li>

</ul>

</nav>

<div class="header-actions">

<button

class="icon-button theme-toggle"

type="button"

aria-label="Theme">

<i class="fa-solid fa-moon"></i>

</button>

<button

class="icon-button"

type="button"

id="searchButton"

aria-label="Search">

<i class="fa-solid fa-magnifying-glass"></i>

</button>

<a

href="wishlist.html"

class="icon-button"

aria-label="Wishlist">

<i class="fa-regular fa-heart"></i>

<span

class="badge"

id="wishlistCount">

0

</span>

</a>

<a

href="cart.html"

class="icon-button"

aria-label="Cart">

<i class="fa-solid fa-bag-shopping"></i>

<span

class="badge"

id="cartCount">

0

</span>

</a>

<a

href="login.html"

class="icon-button"

aria-label="Account">

<i class="fa-regular fa-user"></i>

</a>

</div>

</div>

</header>
<!--=========================================
HERO
==========================================-->

<section class="hero">

<div class="container hero-content">

<div class="hero-text">

<span data-i18n="hero.tag">

New Collection

</span>

<h1 data-i18n="hero.title">

Elegant Jewelry For Every Moment

</h1>

<p data-i18n="hero.description">

Discover timeless jewelry designed to celebrate your style.

</p>

<div class="hero-buttons">

<a

href="shop.html"

class="btn btn-primary"

data-i18n="hero.shop">

Shop Now

</a>

<a

href="about.html"

class="btn btn-outline"

data-i18n="hero.about">

Learn More

</a>

</div>

</div>

<div class="hero-image">

<img

src="assets/images/hero.webp"

alt="LUNOVIA Jewelry"

loading="eager">

</div>

</div>

</section>
<!--=========================================
FEATURED PRODUCTS
==========================================-->

<section class="featured-products">

<div class="container">

<div class="section-header">

<h2 data-i18n="home.featured">

Featured Products

</h2>

<p data-i18n="home.featuredDescription">

Handpicked jewelry you'll love.

</p>

</div>

<div

class="products-grid"

id="featuredProducts">

</div>

<div class="section-footer">

<a

href="shop.html"

class="btn btn-primary"

data-i18n="home.viewAll">

View All Products

</a>

</div>

</div>

</section>
<script src="assets/js/app.js"></script>

<script src="assets/js/products.js"></script>

<script src="assets/js/cart.js"></script>

<script src="assets/js/wishlist.js"></script>

<script src="assets/js/search.js"></script>

<script src="assets/js/theme.js"></script>

<script src="assets/js/language.js"></script>

</div>

</body>

</html>
