<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر لونا للمجوهرات والإكسسوارات</title>

    <!-- هنا نضع أكواد التصميم الـ CSS داخل وسم <style> -->
    <style>
        /* إعداد الألوان والخطوط لكل الصفحة */
        body {
            background-color: #fbf9f6;
            color: #4a3f35;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
        }

        /* تصميم الشريط العلوي الجذاب */
        #main-header {
            background-color: #5c3d2e; /* البني الدافئ */
            color: #ffffff;
            padding: 15px 30px;
            border-bottom: 3px solid #bd9a7a; /* إطار سفلي ذهبي مطفي */
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #main-header h1 {
            margin: 0;
            font-size: 24px;
        }

        #cart-toggle-btn {
            background-color: #bd9a7a;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        /* تنسيق شبكة المنتجات */
        .products-grid {
            display: flex;
            flex-wrap: wrap;
            padding: 20px;
            gap: 20px;
            justify-content: center;
        }

        /* كروت عرض الإكسسوارات */
        .product-card {
            background-color: #ffffff;
            border: 1px solid #e5dec9;
            border-radius: 8px;
            padding: 20px;
            width: 200px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .product-card h3 {
            margin-top: 0;
            font-size: 18px;
        }

        .price {
            color: #a68263;
            font-weight: bold;
            font-size: 16px;
            margin: 10px 0;
        }

        /* تنسيق أزرار الشراء */
        .add-btn {
            background-color: #bd9a7a; /* اللون الذهبي المطفي */
            color: #ffffff;
            border: none;
            padding: 10px 18px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s ease; /* سرعة ونعومة التأثير */
            width: 100%;
        }

        /* تفتيح اللون فور التمرير بالفأرة */
        .add-btn:hover {
            background-color: #a68263;
        }
    </style>
</head>
<body>

    <!-- الهيدر: شريط التنقل العلوي وزر السلة -->
    <header id="main-header">
        <h1>متجر لونا</h1>
        <button id="cart-toggle-btn">السلة (<span id="cart-count">0</span>)</button>
    </header>

    <!-- قسم شبكة المنتجات -->
    <main class="products-grid">

        <!-- كارت المنتج الأول -->
        <div class="product-card">
            <h3>عقد اللؤلؤ الكلاسيكي</h3>
            <p class="price">350 ج.م</p>
            <button class="add-btn" data-id="1" data-price="350">إضافة للسلة</button>
        </div>

        <!-- كارت المنتج الثاني -->
        <div class="product-card">
            <h3>خاتم الياقوت الأحمر</h3>
            <p class="price">220 ج.م</p>
            <button class="add-btn" data-id="2" data-price="220">إضافة للسلة</button>
        </div>

    </main>

    <!-- هنا نضع أكواد التفاعل الـ JavaScript داخل وسم <script> -->
    <script>
        // مصفوفة لحفظ منتجات السلة مؤقتاً بالذاكرة
        const cart = [];

        // تعريف العناصر والتصنت لعملية الضغط
        document.querySelectorAll('.add-btn').forEach(button => {
            button.addEventListener('click', (event) => {
                const btn = event.target;
                const id = btn.getAttribute('data-id');
                const price = parseInt(btn.getAttribute('data-price'));

                // إضافة كائن برمجي للسلة
                cart.push({ id: id, price: price });
                
                // تحديث الواجهة والعداد
                updateCartUI();
            });
        });

        function updateCartUI() {
            // تحديث عداد السلة الإجمالي
            const countSpan = document.getElementById('cart-count');
            countSpan.innerText = cart.length;

            // حساب إجمالي الفاتورة من السلة بذكاء
            let total = 0;
            cart.forEach(item => {
                total += item.price;
            });

            console.log("إجمالي السلة الحالي هو: " + total + " ج.م");
        }
    </script>
</body>
</html>
