<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luna Jewellery | متجر الفخامة الأول</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Cinzel:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="logo-area" onclick="showSection('store-section')">
            <img class="logo-img" src="logo.png" alt="Luna Logo" onerror="this.src='https://images.unsplash.com/photo-1617038260897-41a1f14a8ca0?w=100'">
            <h1 class="brand-name">Luna Jewellery</h1>
        </div>
        <div>
            <button class="btn" onclick="openLoginModal()" id="login-nav-btn">تسجيل الدخول</button>
            <button class="btn" onclick="showSection('cart-section')">السلة (<span id="cart-count">0</span>)</button>
        </div>
    </header>

    <!-- شاشة المعرض الرئيسية -->
    <section id="store-section" class="store-page">
        <div class="products-grid" id="products-container">
            <!-- المنتجات الـ 70 تولد ديناميكياً بواسطة store.js لمنع بطء تحميل الصفحة -->
        </div>
    </section>

    <!-- شاشة السلة والدفع والتوصيل المحسنة -->
    <section id="cart-section" class="modal-content" style="display:none; max-width:800px; margin:40px auto; padding:30px;">
        <h2>حقيبة المشتريات وتفاصيل التوصيل</h2>
        <div id="cart-items" style="margin-bottom:20px;"></div>
        
        <div style="font-size:20px; font-weight:700; margin-bottom:20px; text-align:left;">
            المجموع: <span id="cart-total" style="color:var(--logo-gold);">0</span> ج.م
        </div>

        <!-- فورم شحن احترافي ومفصل -->
        <form id="shipping-form" style="display:grid; gap:15px; margin-bottom:25px;">
            <h3>بيانات التوصيل والشحن</h3>
            <input type="text" id="cust-name" placeholder="الاسم ثلاثي" class="form-input" required style="padding:12px; border-radius:8px; border:1px solid #ddd;">
            <input type="tel" id="cust-phone" placeholder="رقم الهاتف للتواصل" class="form-input" required style="padding:12px; border-radius:8px; border:1px solid #ddd;">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <input type="text" id="cust-gov" placeholder="المحافظة" required style="padding:12px; border-radius:8px; border:1px solid #ddd;">
                <input type="text" id="cust-city" placeholder="المدينة/المنطقة" required style="padding:12px; border-radius:8px; border:1px solid #ddd;">
            </div>
            <div style="display:grid; grid-template-columns:2fr 1fr 1fr; gap:10px;">
                <input type="text" id="cust-street" placeholder="الشارع" required style="padding:12px; border-radius:8px; border:1px solid #ddd;">
                <input type="text" id="cust-building" placeholder="العمارة" required style="padding:12px; border-radius:8px; border:1px solid #ddd;">
                <input type="text" id="cust-floor" placeholder="الشقة/الدور" required style="padding:12px; border-radius:8px; border:1px solid #ddd;">
            </div>
            <button type="button" class="btn" style="background:#e60000; color:#fff;" onclick="sendOrder()">تأكيد الشراء عبر فودافون كاش (01065859268)</button>
        </form>
    </section>

    <!-- نافذة تسجيل الدخول للمستخدمين والمديرين -->
    <div id="login-modal" class="modal">
        <div class="modal-content">
            <h2 style="text-align:center; color:var(--logo-gold);">انضم إلى عائلة لونا</h2>
            <p style="text-align:center; font-size:13px; color:#666;">سجل دخولك لتجربة تسوق مخصصة</p>
            
            <div class="auth-providers">
                <button class="provider-btn" onclick="mockLogin('Google')">
                    <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png" class="provider-icon" alt="Google">
                    جوجل
                </button>
                <button class="provider-btn" onclick="mockLogin('Apple')">
                    <img src="https://cdn-icons-png.flaticon.com/512/0/747.png" class="provider-icon" alt="Apple">
                    آبل
                </button>
                <button class="provider-btn" onclick="mockLogin('Phone')">
                    <img src="https://cdn-icons-png.flaticon.com/512/15/15874.png" class="provider-icon" alt="Phone">
                    الهاتف
                </button>
                <button class="provider-btn" onclick="mockLogin('Guest')">
                    <img src="https://cdn-icons-png.flaticon.com/512/1077/1077114.png" class="provider-icon" alt="Guest">
                    حساب ضيف
                </button>
            </div>

            <div style="margin-top:20px; text-align:center;">
                <a href="admin.html" style="color:var(--logo-dark-gold); text-decoration:none; font-weight:700; font-size:14px;">دخول كإدارة متجر لونا 🔑</a>
            </div>
            <button class="btn" onclick="closeLoginModal()" style="width:100%; margin-top:15px;">إغلاق</button>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/store.js"></script>
</body>
</html>
